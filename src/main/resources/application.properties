# Use H2 in-memory database (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Disable MySQL auto-config entirely
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mysql.MysqlConnectionDetailsAutoConfiguration

# Server port
server.port=8080

# Default security credentials (to avoid startup failure)
spring.security.user.name=admin
spring.security.user.password=admin123
