# Use H2 in-memory database (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Server port
server.port=8080

# Default security credentials
spring.security.user.name=admin
spring.security.user.password=admin123

# JWT secret (required by your app)
jwt.secret=mySecretKey12345678901234567890123456789012345678
jwt.expiration=86400000
