<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Quiz Application</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <!-- Navigation -->
    <nav class="glass-nav" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-brain"></i> Quiz<span class="highlight">App</span>
            </div>
            <ul class="nav-links" id="nav-links">
                <!-- Links injected dynamically based on auth state -->
            </ul>
        </div>
    </nav>

    <!-- Main Content Area where views are injected -->
    <main id="app-root" class="container">
        <!-- Content will be rendered here by router.js -->
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/views.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
